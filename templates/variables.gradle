// ── SmartCalc SDK/version config ──────────────────────────────────────────────
// Capacitor reads this file automatically via android/build.gradle's
// `apply from: '../variables.gradle'` — no regex patching needed.
ext {
    minSdkVersion    = 24   // required by MediaPipe tasks-genai
    compileSdkVersion = 34
    targetSdkVersion  = 34

    // AndroidX versions (keep in sync with Capacitor's own requirements)
    androidxActivityVersion       = '1.9.0'
    androidxAppCompatVersion      = '1.7.0'
    androidxCoordinatorLayoutVersion = '1.2.0'
    androidxCoreVersion           = '1.13.1'
    androidxFragmentVersion       = '1.8.1'
    coreSplashScreenVersion       = '1.0.1'
    androidxWebkitVersion         = '1.11.0'
    junitVersion                  = '4.13.2'
    androidxJunitVersion          = '1.2.1'
    androidxEspressoCoreVersion   = '3.6.1'
    cordovaAndroidVersion         = '10.0.0'
}
