name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Prepare www folder
        run: |
          mkdir -p www
          cp index.html www/index.html

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Fix build.gradle (rootProject bug)
        run: |
          GRADLE=android/app/build.gradle
          echo "=== BEFORE FIX (lines 1-20) ==="
          head -20 $GRADLE

          # Fix 1: Replace rootProject.ext.versionCode/versionName with real values
          # Capacitor 6 generates these references which crash Gradle at startup
          sed -i "s/versionCode\s*rootProject\.ext\.versionCode/versionCode ${{ github.run_number }}/g" $GRADLE
          sed -i "s/versionName\s*rootProject\.ext\.versionName/versionName \"1.${{ github.run_number }}\"/g" $GRADLE

          # Fix 2: Remove the google-services try/catch block (no Firebase used)
          # This block also uses rootProject and causes the same crash
          python3 - << 'EOF'
          import re
          path = 'android/app/build.gradle'
          with open(path) as f:
              lines = f.readlines()

          result = []
          i = 0
          while i < len(lines):
              line = lines[i]
              if re.match(r'\s*try\s*\{', line):
                  block = [line]
                  depth = line.count('{') - line.count('}')
                  j = i + 1
                  while j < len(lines) and depth > 0:
                      block.append(lines[j])
                      depth += lines[j].count('{') - lines[j].count('}')
                      j += 1
                  while j < len(lines) and re.match(r'\s*catch', lines[j]):
                      block.append(lines[j])
                      depth = lines[j].count('{') - lines[j].count('}')
                      j += 1
                      while j < len(lines) and depth > 0:
                          block.append(lines[j])
                          depth += lines[j].count('{') - lines[j].count('}')
                          j += 1
                  block_text = ''.join(block)
                  if 'servicesJSON' in block_text or 'google-services' in block_text:
                      result.append('// google-services block removed\n')
                      print(f"Removed google-services block ({len(block)} lines)")
                  else:
                      result.extend(block)
                  i = j
                  continue
              result.append(line)
              i += 1

          with open(path, 'w') as f:
              f.writelines(result)

          # Verify no rootProject references remain
          content = open(path).read()
          remaining = [l for l in content.split('\n') if 'rootProject' in l]
          if remaining:
              print("ERROR: rootProject still present:")
              for l in remaining:
                  print(f"  {l}")
              exit(1)
          print("OK: No rootProject references remain")
          EOF

          echo "=== AFTER FIX (lines 1-20) ==="
          head -20 $GRADLE

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Patch Android
        run: python3 patch_android.py ${{ github.run_number }}

      - name: Force minSdk 24 for MediaPipe
        run: |
          sed -i 's/minSdk [0-9]*/minSdk 24/g' android/app/build.gradle
          sed -i 's/minSdkVersion [0-9]*/minSdkVersion 24/g' android/app/build.gradle
          echo "minSdk setting:"
          grep -i "minsdk" android/app/build.gradle

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace 2>&1 | tee build.log
          GRADLE_EXIT=${PIPESTATUS[0]}
          if [ $GRADLE_EXIT -ne 0 ]; then
            echo "========================================"
            echo "GRADLE FAILED — FULL LOG:"
            echo "========================================"
            cat build.log
            exit $GRADLE_EXIT
          fi

      - name: Verify APK exists
        run: |
          APK=android/app/build/outputs/apk/debug/app-debug.apk
          if [ -f "$APK" ]; then
            SIZE=$(du -sh "$APK" | cut -f1)
            echo "✅ APK found! Size: $SIZE"
          else
            echo "❌ APK not found"
            exit 1
          fi

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartCalc-v${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: v${{ github.run_number }}
          name: SmartCalc v${{ github.run_number }}
          files: android/app/build/outputs/apk/debug/app-debug.apk
          generate_release_notes: false
          body: SmartCalc v${{ github.run_number }} - tai app-debug.apk ve cai tren Android
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
