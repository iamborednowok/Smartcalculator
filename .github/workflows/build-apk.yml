name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 2. Java + Node ───────────────────────────────────────────────────────
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      # ── 3. Install JS deps ───────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Build web assets ──────────────────────────────────────────────────
      # Problem 1 fix (pre-compile) will be added here in Phase 2.
      # For now: copy index.html as-is.
      - name: Prepare www
        run: |
          mkdir -p www
          cp index.html www/index.html

      # ── 5. Generate Android platform (always fresh) ──────────────────────────
      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      # ── 6. Patch Android (new robust script) ─────────────────────────────────
      # patch_android.py now:
      #   - COPIES templates/ instead of regex-patching generated files
      #   - Uses XML parser for AndroidManifest (not string.replace)
      #   - Uses balanced-brace parser for google-services removal
      #   - Uses `apply from:` for MediaPipe (not dep-block injection)
      #   - variables.gradle is the official Capacitor SDK version mechanism
      - name: Patch Android
        run: python3 patch_android.py ${{ github.run_number }}

      # ── 7. Validate patch results ────────────────────────────────────────────
      - name: Validate patch
        run: |
          echo "=== Checking for rootProject references ==="
          if grep -r "rootProject" android/app/build.gradle; then
            echo "❌ rootProject still present!"
            exit 1
          fi
          echo "✅ No rootProject references"

          echo "=== Checking minSdk ==="
          grep -i "minsdk" android/variables.gradle
          
          echo "=== Checking MediaPipe dependency ==="
          grep "tasks-genai" android/mediapipe.gradle

          echo "=== Checking LLMPlugin registration ==="
          grep "registerPlugin" android/app/src/main/java/com/iamborednowok/smartcalc/MainActivity.java

          echo "=== build.gradle head ==="
          head -30 android/app/build.gradle

      # ── 8. Android SDK ───────────────────────────────────────────────────────
      - uses: android-actions/setup-android@v3

      # ── 9. Build APK ─────────────────────────────────────────────────────────
      - name: Build Debug APK
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleDebug --stacktrace 2>&1 | tee build.log
          GRADLE_EXIT=${PIPESTATUS[0]}
          if [ $GRADLE_EXIT -ne 0 ]; then
            echo "════════════════════════════════════"
            echo "GRADLE FAILED — last 100 lines:"
            echo "════════════════════════════════════"
            tail -100 build.log
            exit $GRADLE_EXIT
          fi

      # ── 10. Verify APK ───────────────────────────────────────────────────────
      - name: Verify APK
        run: |
          APK=android/app/build/outputs/apk/debug/app-debug.apk
          [ -f "$APK" ] || (echo "❌ APK not found"; exit 1)
          echo "✅ APK size: $(du -sh $APK | cut -f1)"

      # ── 11. Upload artifact ──────────────────────────────────────────────────
      - uses: actions/upload-artifact@v4
        with:
          name: SmartCalc-v${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30

      # ── 12. Create GitHub Release ────────────────────────────────────────────
      - uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: v${{ github.run_number }}
          name: SmartCalc v${{ github.run_number }}
          files: android/app/build/outputs/apk/debug/app-debug.apk
          generate_release_notes: false
          body: |
            SmartCalc v${{ github.run_number }}
            Tải app-debug.apk về cài trên Android.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
