name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Prepare www folder
        run: |
          mkdir -p www
          cp index.html www/index.html
          echo "www contents:"
          ls -la www/

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: |
          ls -la www/
          npx cap sync android

      - name: Fix rootProject bug in build.gradle
        run: |
          python3 - <<'EOF'
          import re

          def remove_gms_block(content):
              lines = content.split('\n')
              result = []
              i = 0
              while i < len(lines):
                  line = lines[i]
                  if re.match(r'\s*try\s*[\{\(]', line):
                      block = [line]
                      depth = line.count('{') - line.count('}')
                      j = i + 1
                      while j < len(lines) and depth > 0:
                          block.append(lines[j])
                          depth += lines[j].count('{') - lines[j].count('}')
                          j += 1
                      while j < len(lines) and re.match(r'\s*catch', lines[j]):
                          block.append(lines[j])
                          depth = lines[j].count('{') - lines[j].count('}')
                          j += 1
                          while j < len(lines) and depth > 0:
                              block.append(lines[j])
                              depth += lines[j].count('{') - lines[j].count('}')
                              j += 1
                      block_text = '\n'.join(block)
                      if 'servicesJSON' in block_text or ('google-services' in block_text and 'apply plugin' in block_text):
                          result.append('// google-services block removed (no Firebase)')
                      else:
                          result.extend(block)
                      i = j
                      continue
                  result.append(line)
                  i += 1
              return '\n'.join(result)

          path = 'android/app/build.gradle'
          with open(path) as f:
              content = f.read()
          fixed = remove_gms_block(content)
          with open(path, 'w') as f:
              f.write(fixed)
          print("build.gradle rootProject fix applied")
          if 'servicesJSON' in fixed:
              print("WARNING: servicesJSON still present!")
          else:
              print("OK: servicesJSON block removed successfully")
          EOF
          echo "=== build.gradle lines 1-20 ==="
          head -20 android/app/build.gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Patch Android
        run: python3 patch_android.py ${{ github.run_number }}

      - name: Force minSdk 24 for MediaPipe
        run: |
          sed -i 's/minSdk [0-9]*/minSdk 24/g' android/app/build.gradle
          sed -i 's/minSdkVersion [0-9]*/minSdkVersion 24/g' android/app/build.gradle
          echo "Current minSdk setting:"
          grep -i "minsdk" android/app/build.gradle

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          set -o pipefail
          cd android
          ./gradlew assembleDebug --stacktrace 2>&1 | tee build.log | tail -150
          echo "=== Gradle exit code: $? ==="

      - name: Verify APK exists
        run: |
          APK=android/app/build/outputs/apk/debug/app-debug.apk
          if [ -f "$APK" ]; then
            SIZE=$(du -sh "$APK" | cut -f1)
            echo "✅ APK found! Size: $SIZE"
          else
            echo "❌ APK not found at $APK"
            echo "=== Last 50 lines of build log ==="
            tail -50 android/build.log || echo "(no log)"
            exit 1
          fi

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartCalc-v${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: v${{ github.run_number }}
          name: SmartCalc v${{ github.run_number }}
          files: android/app/build/outputs/apk/debug/app-debug.apk
          generate_release_notes: false
          body: SmartCalc v${{ github.run_number }} - tai app-debug.apk ve cai tren Android
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
