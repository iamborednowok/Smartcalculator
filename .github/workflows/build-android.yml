name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-22.04

    env:
      QT_VERSION: "6.8.3"
      ANDROID_NDK_VERSION: "27.3.13750724"
      QT_INSTALL_DIR: "${{ github.workspace }}/Qt"

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;${{ env.ANDROID_NDK_VERSION }}" "build-tools;35.0.0" "platforms;android-35"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/${{ env.ANDROID_NDK_VERSION }}" >> $GITHUB_ENV

      - name: Remove broken Android preview platforms
        run: |
          find $ANDROID_SDK_ROOT/platforms -maxdepth 1 -name "android-3[6-9]*" -exec rm -rf {} + || true
          ls $ANDROID_SDK_ROOT/platforms/

      - name: Install aqtinstall
        # Pin to a known-good release. Unpinned aqtinstall can silently produce
        # an empty linux_gcc_64 host Qt directory on Qt 6.8+ which breaks CMake.
        run: pip install "aqtinstall==3.2.1"

      - name: Install Qt6 Android arm64 + host Qt
        run: |
          # --autodesktop installs the Android Qt AND the matching Linux host Qt
          # in one shot. Using two separate installs (linux desktop + android) is
          # broken on Qt 6.8+ with newer aqtinstall — the host install silently
          # produces an empty directory with no cmake files.
          aqt install-qt linux android ${{ env.QT_VERSION }} android_arm64_v8a \
            --outputdir "${{ env.QT_INSTALL_DIR }}" \
            --autodesktop \
            --modules qtcharts qtnetworkauth

          # --autodesktop names the host dir gcc_64 or linux_gcc_64 depending on
          # the aqtinstall version — discover the actual path at runtime.
          HOST_QT=$(find "${{ env.QT_INSTALL_DIR }}/${{ env.QT_VERSION }}" \
            -maxdepth 1 -type d \( -name "gcc_64" -o -name "linux_gcc_64" \) | head -1)

          if [ -z "$HOST_QT" ]; then
            echo "ERROR: --autodesktop did not create a host Qt directory."
            echo "Contents of ${{ env.QT_INSTALL_DIR }}/${{ env.QT_VERSION }}/:"
            ls "${{ env.QT_INSTALL_DIR }}/${{ env.QT_VERSION }}/" 2>/dev/null || echo "(missing)"
            exit 1
          fi

          if [ ! -f "${HOST_QT}/lib/cmake/Qt6HostInfo/Qt6HostInfoConfig.cmake" ]; then
            echo "ERROR: Qt6HostInfoConfig.cmake missing from host Qt at ${HOST_QT}"
            echo "Contents of ${HOST_QT}/lib/cmake/:"
            ls "${HOST_QT}/lib/cmake/" 2>/dev/null || echo "(missing)"
            exit 1
          fi

          echo "Host Qt   : $HOST_QT"
          echo "Android Qt: ${{ env.QT_INSTALL_DIR }}/${{ env.QT_VERSION }}/android_arm64_v8a"
          echo "QT_HOST_PATH=${HOST_QT}" >> $GITHUB_ENV
          echo "QT_ANDROID=${{ env.QT_INSTALL_DIR }}/${{ env.QT_VERSION }}/android_arm64_v8a" >> $GITHUB_ENV

      - name: Configure CMake for Android
        run: |
          QT_HOST="${QT_HOST_PATH}"
          QT_AND="${QT_ANDROID}"
          NDK_HOME="${ANDROID_SDK_ROOT}/ndk/${{ env.ANDROID_NDK_VERSION }}"

          echo "QT_HOST_PATH = $QT_HOST"
          echo "QT_ANDROID   = $QT_AND"
          echo "NDK_HOME     = $NDK_HOME"

          # CRITICAL: export QT_HOST_PATH as a shell env var *before* calling
          # qt-cmake. Qt's qt.toolchain.cmake is processed during CMake's early
          # toolchain-detection phase, before -D cache variables are applied.
          # The toolchain reads QT_HOST_PATH from $ENV{QT_HOST_PATH} first;
          # without this export it sees an empty value and throws the fatal
          # "please set QT_HOST_PATH" error even though -DQT_HOST_PATH is set.
          export QT_HOST_PATH="${QT_HOST}"

          "${QT_AND}/bin/qt-cmake" \
            -B build-android \
            -DANDROID_SDK_ROOT="${ANDROID_SDK_ROOT}" \
            -DANDROID_NDK="${NDK_HOME}" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-35 \
            -DQT_HOST_PATH="${QT_HOST}" \
            -DQt6HostInfo_DIR="${QT_HOST}/lib/cmake/Qt6HostInfo" \
            -DCMAKE_BUILD_TYPE=Release \
            -S .

      - name: Build APK
        run: cmake --build build-android --target apk -- -j$(nproc)

      - name: Sign APK
        run: |
          mkdir -p apk-out

          echo "All APKs found:"
          find build-android -name "*.apk" | sort

          APK=$(find build-android -name "SmartCalc.apk" | head -1)
          if [ -z "$APK" ]; then
            APK=$(find build-android -name "*unsigned*.apk" | head -1)
          fi
          if [ -z "$APK" ]; then
            APK=$(find build-android -name "*.apk" | head -1)
          fi
          echo "Signing: $APK"

          mkdir -p ~/.android
          keytool -genkeypair -v \
            -keystore ~/.android/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

          ZIPALIGN=$ANDROID_SDK_ROOT/build-tools/35.0.0/zipalign
          APKSIGNER=$ANDROID_SDK_ROOT/build-tools/35.0.0/apksigner

          $ZIPALIGN -v -p 16384 "$APK" apk-out/SmartCalc-aligned.apk
          $APKSIGNER sign \
            --ks ~/.android/debug.keystore \
            --ks-key-alias androiddebugkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out apk-out/SmartCalc.apk \
            apk-out/SmartCalc-aligned.apk
          rm apk-out/SmartCalc-aligned.apk

          echo "Final APK:"
          ls -lh apk-out/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartCalc-APK
          path: apk-out/SmartCalc.apk
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: apk-v${{ github.run_number }}
          name: SmartCalc APK v${{ github.run_number }}
          files: apk-out/SmartCalc.apk
          generate_release_notes: false
          body: |
            SmartCalc v${{ github.run_number }}
            Tai SmartCalc.apk ve cai tren Android.
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
