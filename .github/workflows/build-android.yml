name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-22.04

    env:
      QT_VERSION: "6.8.3"
      ANDROID_NDK_VERSION: "27.2.12479018"
      QT_INSTALL_DIR: "${{ github.workspace }}/Qt"

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;${{ env.ANDROID_NDK_VERSION }}" "build-tools;35.0.0" "platforms;android-35"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/${{ env.ANDROID_NDK_VERSION }}" >> $GITHUB_ENV

      - name: Remove broken Android preview platforms
        run: |
          find $ANDROID_SDK_ROOT/platforms -maxdepth 1 -name "android-3[6-9]*" -exec rm -rf {} + || true
          ls $ANDROID_SDK_ROOT/platforms/

      - name: Install aqtinstall
        run: pip install aqtinstall

      # Qt 6.8+: desktop arch is now "linux_gcc_64" not "gcc_64"
      - name: Install Qt6 Linux host
        run: |
          aqt install-qt linux desktop ${{ env.QT_VERSION }} linux_gcc_64 \
            --outputdir ${{ env.QT_INSTALL_DIR }} \
            --modules qtcharts qtnetworkauth
          echo "QT_HOST_PATH=${{ env.QT_INSTALL_DIR }}/${{ env.QT_VERSION }}/linux_gcc_64" >> $GITHUB_ENV

      # Qt 6.8+: android must use "all_os" host and "android" target
      - name: Install Qt6 Android arm64
        run: |
          aqt install-qt all_os android ${{ env.QT_VERSION }} android_arm64_v8a \
            --outputdir ${{ env.QT_INSTALL_DIR }} \
            --modules qtcharts qtnetworkauth
          echo "QT_ANDROID=${{ env.QT_INSTALL_DIR }}/${{ env.QT_VERSION }}/android_arm64_v8a" >> $GITHUB_ENV

      - name: Debug Qt install structure
        run: |
          QT_HOST="${{ env.QT_INSTALL_DIR }}/${{ env.QT_VERSION }}/linux_gcc_64"
          QT_AND="${{ env.QT_INSTALL_DIR }}/${{ env.QT_VERSION }}/android_arm64_v8a"
          echo "=== Host Qt cmake dir ==="
          ls "${QT_HOST}/lib/cmake/Qt6/" | grep -E "Host|Info|Config" || echo "NOT FOUND"
          echo "=== Android Qt cmake dir ==="
          ls "${QT_AND}/lib/cmake/Qt6/" | grep -E "Host|Info|Config" || echo "NOT FOUND"
          echo "=== Full linux_gcc_64 tree (2 levels) ==="
          ls "${{ env.QT_INSTALL_DIR }}/${{ env.QT_VERSION }}/"
          echo "=== Qt6HostInfo search ==="
          find "${{ env.QT_INSTALL_DIR }}" -name "Qt6HostInfo.cmake" 2>/dev/null || echo "Qt6HostInfo.cmake not found anywhere"

      - name: Configure CMake for Android
        run: |
          # Resolve all paths explicitly so CMake never sees empty variables
          QT_HOST="${{ env.QT_INSTALL_DIR }}/${{ env.QT_VERSION }}/linux_gcc_64"
          QT_AND="${{ env.QT_INSTALL_DIR }}/${{ env.QT_VERSION }}/android_arm64_v8a"
          NDK_HOME="${ANDROID_SDK_ROOT}/ndk/${{ env.ANDROID_NDK_VERSION }}"

          echo "QT_HOST_PATH = $QT_HOST"
          echo "QT_ANDROID   = $QT_AND"
          echo "NDK_HOME     = $NDK_HOME"

          cmake -B build-android \
            -DCMAKE_TOOLCHAIN_FILE="${NDK_HOME}/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-35 \
            -DANDROID_SDK_ROOT="${ANDROID_SDK_ROOT}" \
            -DCMAKE_FIND_ROOT_PATH="${QT_AND}" \
            -DCMAKE_PREFIX_PATH="${QT_AND}" \
            -DQt6_DIR="${QT_AND}/lib/cmake/Qt6" \
            -DQt6Quick_DIR="${QT_AND}/lib/cmake/Qt6Quick" \
            -DQt6Qml_DIR="${QT_AND}/lib/cmake/Qt6Qml" \
            -DQt6QuickControls2_DIR="${QT_AND}/lib/cmake/Qt6QuickControls2" \
            -DQt6Network_DIR="${QT_AND}/lib/cmake/Qt6Network" \
            -DQT_HOST_PATH="${QT_HOST}" \
            -DQT_HOST_PATH_CMAKE_DIR="${QT_HOST}/lib/cmake/Qt6" \
            -DCMAKE_BUILD_TYPE=Release \
            -S .

      - name: Build APK
        run: cmake --build build-android --target apk -- -j$(nproc)

      - name: Sign APK
        run: |
          mkdir -p apk-out

          echo "All APKs found:"
          find build-android -name "*.apk" | sort

          # Pick best candidate: Qt-named > unsigned > any
          APK=$(find build-android -name "SmartCalc.apk" | head -1)
          if [ -z "$APK" ]; then
            APK=$(find build-android -name "*unsigned*.apk" | head -1)
          fi
          if [ -z "$APK" ]; then
            APK=$(find build-android -name "*.apk" | head -1)
          fi
          echo "Signing: $APK"

          mkdir -p ~/.android
          keytool -genkeypair -v \
            -keystore ~/.android/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

          ZIPALIGN=$ANDROID_SDK_ROOT/build-tools/35.0.0/zipalign
          APKSIGNER=$ANDROID_SDK_ROOT/build-tools/35.0.0/apksigner

          # 16KB page alignment required for Android 15+
          $ZIPALIGN -v -p 16384 "$APK" apk-out/SmartCalc-aligned.apk
          $APKSIGNER sign \
            --ks ~/.android/debug.keystore \
            --ks-key-alias androiddebugkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out apk-out/SmartCalc.apk \
            apk-out/SmartCalc-aligned.apk
          rm apk-out/SmartCalc-aligned.apk

          echo "Final APK:"
          ls -lh apk-out/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartCalc-APK
          path: apk-out/SmartCalc.apk
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: apk-v${{ github.run_number }}
          name: SmartCalc APK v${{ github.run_number }}
          files: apk-out/SmartCalc.apk
          generate_release_notes: false
          body: |
            SmartCalc v${{ github.run_number }}
            Tai SmartCalc.apk ve cai tren Android.
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
