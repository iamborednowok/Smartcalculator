name: 🤖 Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04

    env:
      QT_VERSION: "6.6.3"
      ANDROID_NDK_VERSION: "25.1.8937393"
      QT_INSTALL_DIR: "${{ github.workspace }}/Qt"

    steps:
      # ── 1. Lấy code ────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ── 2. Java 17 ─────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Android SDK + NDK ───────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;${{ env.ANDROID_NDK_VERSION }}"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/${{ env.ANDROID_NDK_VERSION }}" >> $GITHUB_ENV

      # ── 4. Python + aqtinstall ─────────────────────────────────────
      - name: Install aqtinstall
        run: pip install aqtinstall

      # ── 5. Qt6 host (Linux) ────────────────────────────────────────
      - name: Install Qt6 Linux host
        run: |
          aqt install-qt linux desktop ${{ env.QT_VERSION }} gcc_64 \
            --outputdir ${{ env.QT_INSTALL_DIR }} \
            --modules qtcharts qtnetworkauth
          echo "QT_HOST_PATH=${{ env.QT_INSTALL_DIR }}/${{ env.QT_VERSION }}/gcc_64" >> $GITHUB_ENV

      # ── 6. Qt6 Android arm64 ───────────────────────────────────────
      - name: Install Qt6 Android arm64
        run: |
          aqt install-qt linux android ${{ env.QT_VERSION }} android_arm64_v8a \
            --outputdir ${{ env.QT_INSTALL_DIR }} \
            --modules qtcharts qtnetworkauth
          echo "QT_ANDROID=${{ env.QT_INSTALL_DIR }}/${{ env.QT_VERSION }}/android_arm64_v8a" >> $GITHUB_ENV

      # ── 7. Configure CMake ─────────────────────────────────────────
      - name: Configure CMake for Android
        run: |
          cmake -B build-android \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_PREFIX_PATH=$QT_ANDROID \
            -DQT_HOST_PATH=$QT_HOST_PATH \
            -DCMAKE_BUILD_TYPE=Release \
            -S .

      # ── 8. Build APK ───────────────────────────────────────────────
      - name: Build APK
        run: cmake --build build-android --target apk -- -j$(nproc)

      # ── 9. Upload APK ──────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartCalc-APK
          path: build-android/**/*.apk
          if-no-files-found: error
