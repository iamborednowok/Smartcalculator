name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-22.04

    env:
      QT_VERSION: "6.6.3"
      ANDROID_NDK_VERSION: "25.1.8937393"
      QT_INSTALL_DIR: "${{ github.workspace }}/Qt"

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;${{ env.ANDROID_NDK_VERSION }}" "build-tools;34.0.0" "platforms;android-34"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/${{ env.ANDROID_NDK_VERSION }}" >> $GITHUB_ENV

      - name: Remove broken Android preview platforms
        run: |
          find $ANDROID_SDK_ROOT/platforms -maxdepth 1 -name "android-3[5-9]*" -exec rm -rf {} + || true
          ls $ANDROID_SDK_ROOT/platforms/

      - name: Install aqtinstall
        run: pip install aqtinstall

      - name: Install Qt6 Linux host
        run: |
          aqt install-qt linux desktop ${{ env.QT_VERSION }} gcc_64 \
            --outputdir ${{ env.QT_INSTALL_DIR }} \
            --modules qtcharts qtnetworkauth
          echo "QT_HOST_PATH=${{ env.QT_INSTALL_DIR }}/${{ env.QT_VERSION }}/gcc_64" >> $GITHUB_ENV

      - name: Install Qt6 Android arm64
        run: |
          aqt install-qt linux android ${{ env.QT_VERSION }} android_arm64_v8a \
            --outputdir ${{ env.QT_INSTALL_DIR }} \
            --modules qtcharts qtnetworkauth
          echo "QT_ANDROID=${{ env.QT_INSTALL_DIR }}/${{ env.QT_VERSION }}/android_arm64_v8a" >> $GITHUB_ENV

      - name: Configure CMake for Android
        run: |
          cmake -B build-android \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-33 \
            -DANDROID_SDK_ROOT=$ANDROID_SDK_ROOT \
            -DCMAKE_FIND_ROOT_PATH=$QT_ANDROID \
            -DCMAKE_PREFIX_PATH=$QT_ANDROID \
            -DQt6_DIR=$QT_ANDROID/lib/cmake/Qt6 \
            -DQt6Quick_DIR=$QT_ANDROID/lib/cmake/Qt6Quick \
            -DQt6Qml_DIR=$QT_ANDROID/lib/cmake/Qt6Qml \
            -DQt6QuickControls2_DIR=$QT_ANDROID/lib/cmake/Qt6QuickControls2 \
            -DQt6Network_DIR=$QT_ANDROID/lib/cmake/Qt6Network \
            -DQT_HOST_PATH=$QT_HOST_PATH \
            -DQT_HOST_PATH_CMAKE_DIR=$QT_HOST_PATH/lib/cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -S .

      - name: Build APK
        run: cmake --build build-android --target apk -- -j$(nproc)

      - name: Sign APK
        run: |
          mkdir -p apk-out

          echo "All APKs found:"
          find build-android -name "*.apk" | sort

          # Pick best candidate: Qt-named > unsigned > any
          APK=$(find build-android -name "SmartCalc.apk" | head -1)
          if [ -z "$APK" ]; then
            APK=$(find build-android -name "*unsigned*.apk" | head -1)
          fi
          if [ -z "$APK" ]; then
            APK=$(find build-android -name "*.apk" | head -1)
          fi
          echo "Signing: $APK"

          # Generate debug keystore (any valid signature lets Android install the APK)
          mkdir -p ~/.android
          keytool -genkeypair -v \
            -keystore ~/.android/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

          ZIPALIGN=$ANDROID_SDK_ROOT/build-tools/34.0.0/zipalign
          APKSIGNER=$ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner

          $ZIPALIGN -v 4 "$APK" apk-out/SmartCalc-aligned.apk
          $APKSIGNER sign \
            --ks ~/.android/debug.keystore \
            --ks-key-alias androiddebugkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out apk-out/SmartCalc.apk \
            apk-out/SmartCalc-aligned.apk
          rm apk-out/SmartCalc-aligned.apk

          echo "Final APK:"
          ls -lh apk-out/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartCalc-APK
          path: apk-out/SmartCalc.apk
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: apk-v${{ github.run_number }}
          name: SmartCalc APK v${{ github.run_number }}
          files: apk-out/SmartCalc.apk
          generate_release_notes: false
          body: |
            SmartCalc v${{ github.run_number }}
            Tai SmartCalc.apk ve cai tren Android.
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
