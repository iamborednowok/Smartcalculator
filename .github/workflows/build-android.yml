<?xml version="1.0" encoding="utf-8"?>
<manifest xmlns:android="http://schemas.android.com/apk/res/android"
    package="com.smartcalc.app"
    android:versionCode="1"
    android:versionName="1.0">

    <!-- Quyền truy cập internet (dùng cho ApiClient) -->
    <uses-permission android:name="android.permission.INTERNET" />
    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />

    <uses-sdk
        android:minSdkVersion="28"
        android:targetSdkVersion="35" />

    <application
        android:name="org.qtproject.qt.android.bindings.QtApplication"
        android:label="SmartCalc"
        android:icon="@mipmap/ic_launcher"
        android:roundIcon="@mipmap/ic_launcher_round"
        android:theme="@style/AppTheme"
        android:hardwareAccelerated="true">

        <activity
            android:name="org.qtproject.qt.android.bindings.QtActivity"
            android:exported="true"
            android:configChanges="orientation|uiMode|screenLayout|screenSize|smallestScreenSize|layoutDirection|locale|fontScale|keyboard|keyboardHidden|navigation|mcc|mnc|density"
            android:launchMode="singleTop"
            android:screenOrientation="portrait"
            android:label="SmartCalc">

            <intent-filter>
                <action android:name="android.intent.action.MAIN" />
                <category android:name="android.intent.category.LAUNCHER" />
            </intent-filter>

            <!-- Qt 6 metadata: only lib_name and extract_android_style are needed.     -->
            <!-- qt_sources_resource_id / qt_libs_resource_id / bundled_libs_resource_id -->
            <!-- are Qt 5 legacy entries — Qt 6 androiddeployqt does NOT generate       -->
            <!-- those @array/ resources, so keeping them causes resource link failure.  -->
            <meta-data android:name="android.app.lib_name" android:value="SmartCalc" />
            <meta-data android:name="android.app.extract_android_style" android:value="minimal" />
        </activity>
    </application>
</manifest>
