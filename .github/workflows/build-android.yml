name: 🤖 Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

# ✅ FIX 1: Grant contents:write so the token can create releases
permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-22.04

    env:
      QT_VERSION: "6.6.3"
      ANDROID_NDK_VERSION: "25.1.8937393"
      QT_INSTALL_DIR: "${{ github.workspace }}/Qt"

    steps:
      # ── 1. Lấy code ────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ── 2. Java 17 ─────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Android SDK + NDK ───────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;${{ env.ANDROID_NDK_VERSION }}" "build-tools;34.0.0" "platforms;android-34"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/${{ env.ANDROID_NDK_VERSION }}" >> $GITHUB_ENV

      # ── 3b. Remove broken Android preview platforms ───────────────────────
      - name: Remove broken Android preview platforms
        run: |
          find $ANDROID_SDK_ROOT/platforms -maxdepth 1 -name "android-3[5-9]*" -exec rm -rf {} + || true
          echo "Remaining platforms:"
          ls $ANDROID_SDK_ROOT/platforms/

      # ── 4. Python + aqtinstall ─────────────────────────────────────
      - name: Install aqtinstall
        run: pip install aqtinstall

      # ── 5. Qt6 host (Linux) ────────────────────────────────────────
      - name: Install Qt6 Linux host
        run: |
          aqt install-qt linux desktop ${{ env.QT_VERSION }} gcc_64 \
            --outputdir ${{ env.QT_INSTALL_DIR }} \
            --modules qtcharts qtnetworkauth
          echo "QT_HOST_PATH=${{ env.QT_INSTALL_DIR }}/${{ env.QT_VERSION }}/gcc_64" >> $GITHUB_ENV

      # ── 6. Qt6 Android arm64 ───────────────────────────────────────
      - name: Install Qt6 Android arm64
        run: |
          aqt install-qt linux android ${{ env.QT_VERSION }} android_arm64_v8a \
            --outputdir ${{ env.QT_INSTALL_DIR }} \
            --modules qtcharts qtnetworkauth
          echo "QT_ANDROID=${{ env.QT_INSTALL_DIR }}/${{ env.QT_VERSION }}/android_arm64_v8a" >> $GITHUB_ENV

      # ── 6b. Verify Qt components are present ──────────────────────
      - name: Verify Qt Android install
        run: |
          echo "Checking Qt Android cmake modules:"
          ls $QT_ANDROID/lib/cmake/ | grep -E "Qt6(Quick|Qml|Network|Core)" || true

      # ── 7. Configure CMake ─────────────────────────────────────────
      - name: Configure CMake for Android
        run: |
          cmake -B build-android \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-33 \
            -DANDROID_SDK_ROOT=$ANDROID_SDK_ROOT \
            -DCMAKE_FIND_ROOT_PATH=$QT_ANDROID \
            -DCMAKE_PREFIX_PATH=$QT_ANDROID \
            -DQt6_DIR=$QT_ANDROID/lib/cmake/Qt6 \
            -DQt6Quick_DIR=$QT_ANDROID/lib/cmake/Qt6Quick \
            -DQt6Qml_DIR=$QT_ANDROID/lib/cmake/Qt6Qml \
            -DQt6QuickControls2_DIR=$QT_ANDROID/lib/cmake/Qt6QuickControls2 \
            -DQt6Network_DIR=$QT_ANDROID/lib/cmake/Qt6Network \
            -DQT_HOST_PATH=$QT_HOST_PATH \
            -DQT_HOST_PATH_CMAKE_DIR=$QT_HOST_PATH/lib/cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -S .

      # ── 8. Build APK ───────────────────────────────────────────────
      - name: Build APK
        run: cmake --build build-android --target apk -- -j$(nproc)

      # ── 9. Find APK and stage it to a known location ─────────────
      - name: Stage APK for release
        run: |
          mkdir -p apk-out
          # Find every .apk produced anywhere in the build tree and copy to apk-out/
          find build-android -name "*.apk" | sort
          find build-android -name "*.apk" -exec cp {} apk-out/ \;
          echo "Staged APKs:"
          ls -lh apk-out/

      # ── 10. Upload APK as workflow artifact ────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartCalc-APK
          path: apk-out/*.apk
          if-no-files-found: error

      # ── 11. Create GitHub Release (push to main only) ──────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: apk-v${{ github.run_number }}
          name: SmartCalc APK v${{ github.run_number }}
          files: apk-out/*.apk
          generate_release_notes: false
          body: |
            SmartCalc v${{ github.run_number }}
            Tải app-debug.apk về cài trên Android.
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
